<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ 'Editar' if contacto else 'Crear' }} Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 mb-4 text-center text-secondary fw-normal">{{ 'Editar' if contacto else 'Crear' }} Contacto</h2>
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">Nombre</label>
                                <input type="text" class="form-control" name="nombre" value="{{ contacto.nombre if contacto else '' }}" required placeholder="Ej: Juan Pérez">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" name="correo" value="{{ contacto.correo if contacto else '' }}" required placeholder="ejemplo@email.com">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold">Celular</label>
                                <input type="text" class="form-control" name="celular" value="{{ contacto.celular if contacto else '' }}" required placeholder="Número de celular">
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Guardar Contacto</button>
                                <a href="/" class="btn btn-light text-secondary border">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
