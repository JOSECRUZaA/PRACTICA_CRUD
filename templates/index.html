<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 text-secondary">Lista de Contactos</h1>
            <a href="/crear" class="btn btn-primary btn-sm px-3">Crear Nuevo</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Celular</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in contactos %}
                            <tr>
                                <td class="ps-4">{{ c.id }}</td>
                                <td class="fw-medium">{{ c.nombre }}</td>
                                <td class="text-muted">{{ c.correo }}</td>
                                <td>{{ c.celular }}</td>
                                <td class="text-end pe-4">
                                    <a href="/editar/{{ c.id }}" class="btn btn-outline-secondary btn-sm me-1">Editar</a>
                                    <a href="/eliminar/{{ c.id }}" onclick="return confirm('¿Seguro que deseas eliminar?');" class="btn btn-outline-danger btn-sm">Eliminar</a>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="5" class="text-center text-muted py-5">No hay contactos registrados.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
